name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "$fmt"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -short ./...
